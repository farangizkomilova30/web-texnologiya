<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Banner</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
        }

        .hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://picsum.photos/id/1015/1600/900');
    background-size: cover;
    background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero-content {
            max-width: 700px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .hero button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: #ff7a00;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .hero button:hover {
            background: #e56700;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Xush kelibsiz!</h1>
            <p>Bizning web saytimiz orqali yangi imkoniyatlarni kashf eting.</p>
            <button>Boshlash</button>
        </div>
    </section>

</body>
</html>
